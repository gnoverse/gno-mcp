name: Release
# Manual-only: dispatch with a component + version. gnomcp and agentfaucet release
# on INDEPENDENT cadences and version lines — releasing one never rebuilds the
# other. See docs/releasing.md.
#
# gnomcp is the primary product: plain semver tag (v<version>), full goreleaser
# release (archives + GitHub release + image). agentfaucet is image-only: its git
# tag is prefixed (agentfaucet/v<version>) for an independent line, and goreleaser
# runs with GORELEASER_CURRENT_TAG=v<version> + release.disable so it builds and
# pushes only the image. The whole run is one job (default GITHUB_TOKEN suffices —
# no downstream tag-triggered workflow exists).
on:
  workflow_dispatch:
    inputs:
      component:
        description: "Which component to release"
        required: true
        type: choice
        options: [gnomcp, agentfaucet]
      version:
        description: "Release version, e.g. 0.2.0 (v prefix optional)"
        required: true
        type: string
permissions: {} # each job declares exactly what it needs
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the release tag, create the GitHub release, upload artifacts
      packages: write # push container images to ghcr.io
      id-token: write # sign the build provenance attestation (keyless OIDC)
      attestations: write # store the attestation
    env:
      COMPONENT: ${{ inputs.component }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - name: Validate version and compute the tag
        env:
          RAW_VERSION: ${{ inputs.version }} # via env, never inlined: injection hygiene
        run: |
          set -euo pipefail
          version="${RAW_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::invalid version '$RAW_VERSION' (want X.Y.Z or X.Y.Z-pre)"
            exit 1
          fi
          # gnomcp keeps a plain semver tag; agentfaucet gets a prefixed line.
          if [ "$COMPONENT" = "gnomcp" ]; then tag="v$version"; else tag="$COMPONENT/v$version"; fi
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::tag ${tag} already exists; to re-release, delete it first: git push --delete origin ${tag}"
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/gnoverse/${COMPONENT}" >> "$GITHUB_ENV"
      # gnomcp ships as a plugin: its version lives in committed manifests, so guard
      # against a tag/manifest mismatch. agentfaucet has no manifest (tag-versioned).
      - name: Check manifest versions match (gnomcp only)
        if: ${{ inputs.component == 'gnomcp' }}
        run: |
          set -euo pipefail
          if ! ./scripts/bump-version.sh --check "$VERSION"; then
            echo "::error::manifests don't carry $VERSION — run 'make bump VERSION=$VERSION', commit, merge, then re-dispatch"
            exit 1
          fi
      # All fallible setup runs BEFORE the tag push: nothing that can fail may sit
      # between the tag push and goreleaser, so a setup failure can't strand a tag.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version: '1.26.4' }
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          # agentfaucet's clean version is supplied via GORELEASER_CURRENT_TAG (its
          # real tag is prefixed, agentfaucet/v…). Skip goreleaser's git-state
          # validate for it: that check resolves the bare "v<version>" to a
          # same-numbered gnomcp tag on a different commit and aborts the release.
          args: >-
            release --clean
            --config ".goreleaser.${{ inputs.component }}.yaml"
            ${{ inputs.component == 'agentfaucet' && '--skip=validate' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # agentfaucet's git tag (agentfaucet/v…) isn't semver, so tell goreleaser
          # the clean version. Empty for gnomcp → goreleaser reads its plain v tag.
          GORELEASER_CURRENT_TAG: ${{ inputs.component == 'agentfaucet' && format('v{0}', env.VERSION) || '' }}
      # gnomcp publishes archives to a GitHub release; attest their checksums.
      # agentfaucet is image-only (no archives) — its image is attested below.
      - name: Attest release binaries (gnomcp only)
        if: ${{ inputs.component == 'gnomcp' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
      - name: Collect pushed image digest
        id: imgdigest
        run: |
          set -euo pipefail
          # dockers_v2 emits one "Docker Image" (artifact.DockerImageV2) per pushed
          # tag; the multi-arch index for the version tag carries .extra.Digest.
          # Match the exact versioned name to grab the index (not a per-arch entry
          # or the :latest duplicate); attesting the index digest covers all tags.
          digest="$(jq -r --arg img "${IMAGE}:${VERSION}" '
            [ .[] | select(.type == "Docker Image" and .name == $img) | .extra.Digest ]
            | unique | .[0] // empty' dist/artifacts.json)"
          if [ -z "$digest" ]; then
            echo "::error::could not resolve image digest from dist/artifacts.json"
            jq -r '.[] | select(.type | test("Docker")) | .type + "  " + .name + "  " + (.extra.Digest // "-")' dist/artifacts.json
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Attest image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.imgdigest.outputs.digest }}
          push-to-registry: true

name: Release
# Manual-only: dispatch with a version input; the workflow validates, tags
# HEAD of the chosen ref, and runs goreleaser in the same run (so the default
# GITHUB_TOKEN suffices — no downstream tag-triggered workflow exists).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.2.0 (v prefix optional)"
        required: true
        type: string
permissions: {} # each job declares exactly what it needs
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # push the release tag, create the GitHub release, upload artifacts
      id-token: write # sign the build provenance attestation (keyless OIDC)
      attestations: write # store the attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - name: Validate version and guard against existing tag
        env:
          RAW_VERSION: ${{ inputs.version }} # via env, never inlined: injection hygiene
        run: |
          version="${RAW_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::invalid version '$RAW_VERSION' (want X.Y.Z or X.Y.Z-pre)"
            exit 1
          fi
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "::error::tag v$version already exists; to re-release, delete it first: git push --delete origin v$version"
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
      - name: Check manifest versions match
        run: ./scripts/bump-version.sh --check "$VERSION"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.26.4' }
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

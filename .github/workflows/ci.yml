name: CI
# pull_request (not pull_request_target) runs untrusted fork code under a
# read-only, secret-less token. Do NOT add any secrets.* to this file: doing so
# would expose them to fork PRs.
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version: '1.26.4' }
      - run: go test -short -race ./...
      - run: go vet ./...
      # Compile-check the integration-tagged tests so the real-node harness can't rot unnoticed.
      - run: go vet -tags=integration ./test/integration/...
      - run: gofmt -l -d . | tee /tmp/fmt && test ! -s /tmp/fmt
  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version: '1.26.4' }
      # govulncheck is intentionally @latest: it is a first-party Go-team tool and
      # the vuln database is fetched at run time regardless, so @latest keeps the
      # scanner and its advisory tooling current.
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  release-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      # git describe resolves to the newest tag — the agentfaucet/v… prefixed one,
      # which is non-semver. goreleaser would bake that slash into the snapshot
      # image tag (gnomcp:agentfaucet/v…-SNAPSHOT-…) → "invalid reference format".
      # Pin both snapshot builds to the latest gnomcp semver tag instead.
      - name: Pin a semver tag for the snapshot builds
        run: |
          set -euo pipefail
          tag="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          echo "GORELEASER_CURRENT_TAG=$tag" >> "$GITHUB_ENV"
      - run: ./scripts/bump-version_test.sh
      - run: ./scripts/bump-version.sh --check
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version: '1.26.4' }
      # QEMU + buildx so the snapshot can build the arm64 image layer on this
      # amd64 runner (the Dockerfiles only COPY a prebuilt binary — no compile).
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Schema-check both release configs, then build each release matrix (binaries
      # + images) as a snapshot so config rot surfaces on PRs instead of on release
      # day. Snapshot builds images but never pushes them. --clean wipes dist/
      # between the two, so each snapshot's digest is asserted before the next runs.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: check --config .goreleaser.gnomcp.yaml
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: check --config .goreleaser.agentfaucet.yaml
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --snapshot --clean --config .goreleaser.gnomcp.yaml
      # Guard the release.yml image-attestation contract: the digest extraction
      # there filters on type "Docker Image" + .extra.Digest. Assert that shape
      # holds in the snapshot artifacts so a goreleaser rename breaks a PR, not a
      # release. (Snapshot tags are arch-suffixed, so match by repo prefix here.)
      - name: Assert gnomcp image digest is extractable
        env: { REPO: ghcr.io/gnoverse/gnomcp }
        run: |
          set -euo pipefail
          d=$(jq -r --arg repo "$REPO" \
            '[ .[] | select(.type == "Docker Image" and (.name | startswith($repo + ":"))) | .extra.Digest ] | map(select(. != null and . != "")) | .[0] // empty' \
            dist/artifacts.json)
          if [ -z "$d" ]; then
            echo "::error::no extractable image digest for $REPO — release.yml attestation would fail"
            jq -r '.[] | select(.type | test("Docker")) | .type + "  " + .name + "  " + (.extra.Digest // "-")' dist/artifacts.json
            exit 1
          fi
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --snapshot --clean --config .goreleaser.agentfaucet.yaml
      - name: Assert agentfaucet image digest is extractable
        env: { REPO: ghcr.io/gnoverse/agentfaucet }
        run: |
          set -euo pipefail
          d=$(jq -r --arg repo "$REPO" \
            '[ .[] | select(.type == "Docker Image" and (.name | startswith($repo + ":"))) | .extra.Digest ] | map(select(. != null and . != "")) | .[0] // empty' \
            dist/artifacts.json)
          if [ -z "$d" ]; then
            echo "::error::no extractable image digest for $REPO — release.yml attestation would fail"
            jq -r '.[] | select(.type | test("Docker")) | .type + "  " + .name + "  " + (.extra.Digest // "-")' dist/artifacts.json
            exit 1
          fi

name: CI
# pull_request (not pull_request_target) runs untrusted fork code under a
# read-only, secret-less token. Do NOT add any secrets.* to this file: doing so
# would expose them to fork PRs.
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.26.4' }
      - run: go test -short -race ./...
      - run: go vet ./...
      # Compile-check the integration-tagged tests so the real-node harness can't rot unnoticed.
      - run: go vet -tags=integration ./test/integration/...
      - run: gofmt -l -d . | tee /tmp/fmt && test ! -s /tmp/fmt
  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.26.4' }
      # govulncheck is intentionally @latest: it is a first-party Go-team tool and
      # the vuln database is fetched at run time regardless, so @latest keeps the
      # scanner and its advisory tooling current.
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  release-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { fetch-depth: 0 }
      - run: ./scripts/bump-version_test.sh
      - run: ./scripts/bump-version.sh --check
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.26.4' }
      # Schema-check the goreleaser config, then build the full release matrix
      # as a snapshot so config rot surfaces on PRs instead of on release day.
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: check
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: release --snapshot --clean

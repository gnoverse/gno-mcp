name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - run: go test -short -race ./...
      - run: go vet ./...
      - run: gofmt -l -d . | tee /tmp/fmt && test ! -s /tmp/fmt

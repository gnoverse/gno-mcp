version: 2
updates:
  # Keep the SHA-pinned actions fresh — Dependabot bumps the pin to the new
  # commit when a referenced major tag advances.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  # Surface dependency updates (and the security advisories that motivated the
  # toolchain/go-sdk/x-net bumps) early.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    ignore:
      # gno is tracked at a master pseudo-version, which Dependabot orders below
      # any v1.x release tag — so it perpetually proposes a "bump" to the latest
      # tag that is actually older in commit history. Bump gno to master by hand.
      - dependency-name: github.com/gnolang/gno

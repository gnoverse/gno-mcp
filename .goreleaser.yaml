version: 2
builds:
  - id: gno-mcp
    main: ./cmd/gno-mcp
    binary: gno-mcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: gnolang
    name: gno-mcp
